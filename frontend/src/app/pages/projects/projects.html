<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-folder"></i> My Projects</h2>
    <button class="btn btn-primary" (click)="openCreateModal()">
      <i class="bi bi-plus-lg"></i> New Project
    </button>
  </div>

  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border text-primary"></div>
  </div>

  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <div *ngIf="!loading && projects.length === 0" class="text-center py-5">
    <i class="bi bi-folder-x" style="font-size: 4rem; color: #ccc;"></i>
    <p class="mt-3 text-muted">No projects yet. Create your first project!</p>
  </div>

  <div class="row g-3">
    <div *ngFor="let p of projects" class="col-md-6 col-lg-4">
      <a [routerLink]="['/projects', p.id]" class="text-decoration-none">
        <div class="card shadow-sm h-100 project-card">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-start mb-2">
              <h5 class="card-title text-dark mb-0">{{ p.name }}</h5>
              <span class="badge" [class.bg-danger]="p.myRole === 'ADMIN'" [class.bg-info]="p.myRole === 'MEMBER'">
                {{ p.myRole }}
              </span>
            </div>
            <p class="text-muted small mb-2">{{ p.description || 'No description' }}</p>
            <p class="text-muted small mb-0">
              <i class="bi bi-person"></i> {{ p.createdByName }}
            </p>
            <button *ngIf="p.myRole === 'ADMIN'"
                    class="btn btn-sm btn-outline-danger mt-2"
                    (click)="deleteProject(p.id, $event)">
              <i class="bi bi-trash"></i> Delete
            </button>
          </div>
        </div>
      </a>
    </div>
  </div>
</div>

<!-- Create Project Modal -->
<div class="modal-backdrop-custom" *ngIf="showModal" (click)="closeModal()"></div>
<div class="modal-custom" *ngIf="showModal">
  <div class="card shadow-lg">
    <div class="card-header bg-primary text-white">
      <h5 class="mb-0">Create New Project</h5>
    </div>
    <div class="card-body">
      <div class="mb-3">
        <label class="form-label">Project Name *</label>
        <input type="text" class="form-control" [(ngModel)]="newName" placeholder="e.g. Website Redesign">
      </div>
      <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea class="form-control" [(ngModel)]="newDescription" rows="3"></textarea>
      </div>
    </div>
    <div class="card-footer text-end">
      <button class="btn btn-secondary me-2" (click)="closeModal()">Cancel</button>
      <button class="btn btn-primary" (click)="createProject()" [disabled]="creating || !newName.trim()">
        {{ creating ? 'Creating...' : 'Create' }}
      </button>
    </div>
  </div>
</div>
