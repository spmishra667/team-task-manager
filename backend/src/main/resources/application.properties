spring.application.name=backend

# Server Port (Railway sets PORT env variable)
server.port=${PORT:8080}

# PostgreSQL Database (Railway provides DATABASE_URL)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/taskmanager}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Config
jwt.secret=${JWT_SECRET:mySuperSecretKeyForJWTTokenGenerationMustBe256BitsLong123456}
jwt.expiration=86400000